project:
  name: cpp_dlc_live
  session_id: auto_timestamp
  out_dir: D:/data/LiuZY/deeplabcut_cpp/dryrun_test_output
# Optional global fixed FPS. When set, it overrides runtime cadence + recording FPS + analysis timebase.
fixed_fps: null
session_info:
  mouse_id: "M001"
  group: "Control"
  experiment_duration_s: 600
  # Set by pre-run popup:
  laser_mode: "pulse"
  laser_on_chambers: [chamber1]
  pulse_freq_hz: 20.0
  acclimation_enabled: false
  acclimation_duration_s: 0

# Optional pre-experiment acclimation period (preview only, no saving/no logging).
acclimation:
  enabled: false
  duration_s: 0
camera:
  source: C:/Users/admin/Downloads/Trial_11_7381.avi
  width: 1280
  height: 720
  fps_target: 30
  enforce_fps: false
  # For file source: true=simulate realtime pacing, false=process as fast as possible.
  file_realtime_throttle: true
  # Set false to lock exposure; null keeps camera default behavior.
  auto_exposure: null
  # Manual exposure value (device/backend-specific units; often negative on Windows UVC).
  exposure: null
  # Optional analog/digital gain (device/backend-specific units).
  gain: null
  flip: false
  rotate_deg: 0
dlc:
  model_path: C:\Users\admin\Desktop\RTPPTest-liu-2026-02-27\exported-models-pytorch\DLC_RTPPTest_resnet_50_iteration-0_shuffle-1\DLC_RTPPTest_resnet_50_iteration-0_shuffle-1_snapshot-best-10.pt
  backend: 'pytorch'
  device: auto
  # Fail fast when DLCLive cannot be initialized (no fallback to mock runtime).
  strict_runtime: false
  # Control bodypart for ROI/chamber classification and laser logic.
  bodypart: Mouse
  # Optional preview overlay bodyparts. null/omit => only control bodypart.
  # Example: ['head', 'tail', 'center'] or ['all'] for all model keypoints.
  display_bodyparts: null
  p_thresh: 0.6
  smoothing:
    enabled: true
    window: 5
roi:
  type: polygon
  chamber1:
  - - 173
    - 73
  - - 170
    - 130
  - - 113
    - 133
  - - 116
    - 356
  - - 331
    - 354
  - - 339
    - 75
  - - 173
    - 76
  chamber2:
  - - 342
    - 80
  - - 334
    - 351
  - - 488
    - 359
  - - 486
    - 303
  - - 552
    - 302
  - - 555
    - 78
  - - 342
    - 77
  neutral:
  - - 173
    - 74
  - - 559
    - 78
  - - 639
    - 7
  - - 2
    - 2
  - - 175
    - 75
  strategy_on_neutral: 'off'
  debounce_frames: 8
laser_control:
  enabled: true
  # dryrun | continuous | pulse | gated | startstop
  mode: dryrun
  # Which chamber states should trigger laser ON.
  # Supports: chamber1, chamber2, neutral, none (aliases: ch1/ch2). Default is [chamber1].
  # Use [none] to force no chamber-triggered ON transitions (laser stays OFF unless enabled elsewhere).
  on_chambers: [chamber1]
  # For mode=continuous (steady ON/OFF), output line:
  continuous_line: cDAQ1Mod4/port0/line0
  # For mode=pulse alias, choose implementation: gated | startstop
  pulse_mode: gated
  freq_hz: 20.0
  duty_cycle: 0.05
  ctr_channel: cDAQ1Mod4/ctr0
  pulse_term: /cDAQ1Mod4/PFI0
  enable_line: cDAQ1Mod4/port0/line0
  min_on_s: 0.2
  min_off_s: 0.2
  unknown_policy: 'off'
  fallback_to_dryrun: true
analysis:
  auto_after_run: true
  cm_per_px: null
  # Legacy per-analysis fixed FPS. Prefer top-level fixed_fps for unified behavior.
  fixed_fps_hz: null
  output_plots: true
preview_recording:
  enabled: false
  filename: preview_overlay.mp4
  codec: mp4v
  fps: null
  overlay: true
raw_recording:
  enabled: false
  filename: raw_video.mp4
  codec: mp4v
  fps: null
runtime_logging:
  enabled: true
  issue_events_file: issue_events.jsonl
  heartbeat_interval_s: 5.0
  low_conf_warn_every_n: 30
  inference_warn_ms: 80.0
  fps_warn_below: 10.0
